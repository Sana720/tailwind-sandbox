<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tailwind Sandbox Test</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 50px;
      background-color: #f3f4f6;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 class="text-xl font-bold">Hello World</h2>
    <p class="text-base text-gray-600">This is a paragraph inside a card component.</p>
    <button class="bg-blue-600 text-white px-4 py-2 rounded">Click Me</button>
  </div>
</body>
</html>
